<!DOCTYPE html>
<html>
<head>
  <title>Intel Hillsboro Badge Checklist</title>

  <style>
    body {
      font-family: Segoe UI, Arial;
      background: #f2f6fa;
      margin: 0;
      padding: 40px;
    }

    #container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    h2 {
      text-align: center;
      color: #002a5c;
    }

    .persona {
      margin-bottom: 20px;
      padding: 15px;
      background: #eef4fb;
      border-radius: 8px;
    }

    .check {
      background: #f9fbfd;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
      border: 1px solid #e1e6eb;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background: #0076ff;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #005ed1;
    }

    #result {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
    }

    #guidance {
      margin-top: 15px;
      padding: 15px;
      background: #eef6ff;
      border-left: 5px solid #0076ff;
      border-radius: 6px;
    }

    #progressBar {
      margin-top: 15px;
      background: #e6edf5;
      border-radius: 10px;
      overflow: hidden;
      height: 18px;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0076ff, #00a3ff);
      transition: width 0.3s ease;
    }

    a {
      color: #0076ff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div id="container">
  <h2>Intel Hillsboro Badge Checklist
  </h2>

  <div class="persona">
    <b>Select your situation:</b><br><br>

    <input type="radio" name="persona" value="new"> New Badge  
    <input type="radio" name="persona" value="renewal"> Renewal  
    <input type="radio" name="persona" value="wifi"> WiFi Only  
  </div>

  <div id="checklist"></div>

  <button onclick="checkStatus()">Check My Status</button>

  <div id="result"></div>

  <div id="progressBar">
    <div id="progressFill"></div>
  </div>

  <div id="guidance"></div>

</div>

<script>

const LINKS = {
  training: "https://asml.sharepoint.com/sites/CSUS-Mgmt-Support-Coordinator/SitePages/Intel-Hillsboro---Requester-Instructions.aspx#step-1-complete-required-mandatory-ehs-training-asml-internal-training",
  request: "https://asml.sharepoint.com/sites/CSUS-Mgmt-Support-Coordinator/SitePages/Intel-Hillsboro---Requester-Instructions.aspx#step-2-submit-your-access-request",
  docs: "https://asml.sharepoint.com/sites/CSUS-Mgmt-Support-Coordinator/SitePages/Intel-Hillsboro---Requester-Instructions.aspx#step-3-sign-required-documents",
  wwid: "https://asml.sharepoint.com/sites/CSUS-Mgmt-Support-Coordinator/SitePages/Intel-Hillsboro---Requester-Instructions.aspx#step-4-complete-intel-mandatory-trainings",
  glchat: "https://asml.sharepoint.com/sites/CSUS-Mgmt-Support-Coordinator/SitePages/Intel-Hillsboro---Requester-Instructions.aspx#step-5-request-a-gl-chat",
  ehs: "https://asml.sharepoint.com/sites/CSUS-Mgmt-Support-Coordinator/SitePages/Intel-Hillsboro---Requester-Instructions.aspx#step-6-ehs-regulatory-training-acknowledgement",
  intel: "https://asml.sharepoint.com/sites/CSUS-Mgmt-Support-Coordinator/SitePages/Intel-Hillsboro---Requester-Instructions.aspx#step-7-complete-intel-mandatory-trainings",
  tour: "https://asml.sharepoint.com/sites/CSUS-Mgmt-Support-Coordinator/SitePages/Intel-Hillsboro---Requester-Instructions.aspx#step-9-sign-up-for-fab-sub-fab-tour",
  final: "https://asml.sharepoint.com/sites/CSUS-Mgmt-Support-Coordinator/SitePages/Intel-Hillsboro---Requester-Instructions.aspx#step-10-request-for-fab-access",
  renewal: "https://asml.sharepoint.com/sites/CSUS-Mgmt-Support-Coordinator/SitePages/Intel-Hillsboro---Requester-Instructions.aspx?csf=1&web=1&e=IPl8Yk&CID=2fe9b50f-c5e2-43a8-a5f6-32fa2300d22b#renewal-request",
  wifi: "https://asml.sharepoint.com/sites/CSUS-Mgmt-Support-Coordinator/SitePages/Intel-Hillsboro---Requester-Instructions.aspx?csf=1&web=1&e=IPl8Yk&CID=2fe9b50f-c5e2-43a8-a5f6-32fa2300d22b#wi-fi-access-request"
};

document.querySelectorAll('input[name="persona"]').forEach(radio => {
  radio.addEventListener("change", loadChecklist);
});

function loadChecklist() {
  let persona = document.querySelector('input[name="persona"]:checked');
  let checklist = document.getElementById("checklist");

  if (!persona) return;

  if (persona.value === "new") {
    checklist.innerHTML = `
      <div class="check"><input type="checkbox" data-link="training"> Complete EHS Training</div>
      <div class="check"><input type="checkbox" data-link="request"> Submit Badge Request</div>
      <div class="check"><input type="checkbox" data-link="docs"> Sign Documents</div>
      <div class="check"><input type="checkbox" data-link="wwid"> Receive WWID and Complete Mandatory Intel Trainings</div>
      <div class="check"><input type="checkbox" data-link="glchat"> Complete GL Chat</div>
      <div class="check"><input type="checkbox" data-link="ehs"> Complete EHS Acknowledgement</div>
      <div class="check"><input type="checkbox" data-link="intel"> Complete Intel Trainings</div>
      <div class="check"><input type="checkbox" data-link="tour"> Complete FAB Tour</div>
    `;
  }

  if (persona.value === "renewal") {
    checklist.innerHTML = `
      <div class="check"><input type="checkbox" data-link="renewal"> Submit Renewal Request</div>
      <div class="check"><input type="checkbox" data-link="intel"> Complete Required Intel Trainings</div>
      <div class="check"><input type="checkbox" data-link="glchat"> GL Chat Completed</div>
    `;
  }

  if (persona.value === "wifi") {
    checklist.innerHTML = `
      <div class="check"><input type="checkbox" data-link="wifi"> Submit WiFi Request</div>
    `;
  }
}

function checkStatus() {
  let boxes = document.querySelectorAll("#checklist input");
  let result = document.getElementById("result");
  let guidance = document.getElementById("guidance");

  let missing = [];

  boxes.forEach(box => {
    if (!box.checked) {
      missing.push({
        text: box.parentElement.innerText,
        linkKey: box.getAttribute("data-link")
      });
    }
  });

  let total = boxes.length;
  let done = total - missing.length;
  let percent = Math.round((done / total) * 100);

  document.getElementById("progressFill").style.width = percent + "%";

 let persona = document.querySelector('input[name="persona"]:checked').value;

if (missing.length === 0) {
  result.innerHTML = "✅ You are READY!";
  result.style.color = "green";

  // ✅ WIFI ONLY FIX
  if (persona === "wifi") {
    guidance.innerHTML = `
      🎉 You're all set!<br><br>
      ✅ No further action needed for WiFi access.
    `;
  } else {
    // Default (new + renewal)
    guidance.innerHTML = `
      🎉 You're all set!<br><br>
      👉 <a href="${LINKS.final}" target="_blank">Submit FAB Access Request</a>
    `;
  }

  } else {
    result.innerHTML = "❌ Missing steps<br>";
    result.style.color = "#cc0000";

    let next = missing[0];
    let stepLink = LINKS[next.linkKey];

    guidance.innerHTML = `
      👉 <b>Next Step:</b> ${next.text}<br><br>
      🔗 <a href="${stepLink}" target="_blank">Go directly to this step</a>
    `;
  }

  result.innerHTML += "<br><br>📊 Progress: " + percent + "% complete";
}

</script>

</body>
</html>
